name: flutter_ui
description: "Bitchat Flutter UI Module"
version: 1.0.0+1

environment:
  sdk: ^3.0.0 # 建議設定為更寬容的範圍，確保相容性

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- 建議新增的資源與套件 ---

  # 狀態管理（選用，建議加入以處理複雜的 Peer 列表與訊息狀態）
  provider: ^6.1.2

  # 非同步處理（處理 Bridge 的事件流非常方便）
  rxdart: ^0.27.7

  # 圖片快取（後續如果顯示 Peer 頭像會用到）
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # 修正版本號

flutter:
  uses-material-design: true

  # 如果您有 Logo 或 Onboarding 的插圖，請取消註解並確保目錄存在
  # assets:
  #   - assets/images/logo.png
  #   - assets/images/onboarding_bg.png

  module:
    androidX: true
    androidPackage: com.example.flutter_ui
    iosBundleIdentifier: com.example.flutterUi