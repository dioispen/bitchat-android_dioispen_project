name: flutter_ui
description: "Bitchat Flutter UI Module"
version: 1.0.0+1

environment:
  sdk: ^3.0.0 # 建議設定為更寬容的範圍，確保相容性

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  flutter_map_cache: ^1.3.0
  dio_cache_interceptor_hive_store: ^3.2.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # 修正版本號

flutter:
  uses-material-design: true

  # 如果您有 Logo 或 Onboarding 的插圖，請取消註解並確保目錄存在
  # assets:
  #   - assets/images/logo.png
  #   - assets/images/onboarding_bg.png

  module:
    androidX: true
    androidPackage: com.example.flutter_ui
    iosBundleIdentifier: com.example.flutterUi